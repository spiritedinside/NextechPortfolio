<html>

        <title>Virginia's Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gorditas:wght@400;700&display=swap" rel="stylesheet">

    <script defer src="script.js"></script>
    <body class="contactBody">
        <header>
            <ul>
                <li><a href="home.html">Home</a></li>
                <br>
                <li><a href="about.html">About</a></li>
                <br>
                <li><a href="projects.html">Projects</a></li>
                <br>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </header>
        <main>
            <h1>Find me here!</h1>
            <div>
                <div>
                    <a href="www.linkedin.com/in/virginia-walthers-a9706b414"><img id="linkedin" src="linkedin.png"></a>
                </div>
                <div>
                    <a href="https://github.com/spiritedinside"><img src="github.png"></a>
                </div>
            </div>
            <h1>Or...</h1>
            <br>
            <h1>send me a message here!</h1>
            <div class="contact-container">
                <form class="contact-form" id="contactForm"
                action="https://formspree.io/f/xpqgyrjo" method="POST">
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" name="name" id="name" placeholder="Enter your name" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone</label>
                        <input type="phone" name="phone" id="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="input-group" id="message">
                        <label for="message">Message</label>
                        <textarea name="message"  placeholder="Enter your message" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </main>
    </body>
</html>
